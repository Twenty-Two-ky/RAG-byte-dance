version: '3.8'

services:
  gemini-test-expert:
    build: .
    image: gemini-test-expert:latest
    container_name: gemini_test_expert_container
    ports:
      - "8501:8501"
    volumes:
      # 【重要】挂载本地 data 目录，确保向量库和配置文件不丢失
      # 格式: 宿主机路径:容器内路径
      - ./data:/app/data
    environment:
      # 【代理设置】
      # 如果您在国内使用，必须配置代理才能访问 Google API
      # host.docker.internal 代表宿主机的 IP (Win/Mac/Linux Docker v20.10+)
      # 请根据您本地代理软件(如Clash/v2ray)的端口修改，通常是 7890 或 7897
      - HTTP_PROXY=http://host.docker.internal:7897
      - HTTPS_PROXY=http://host.docker.internal:7897
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped